# =====================================================================
# Pipeline de Integração Contínua (CI) - DescomplicaBusiness API
# Trabalho Final - Cloud Computing - UNIDAVI - Felipe Macedo
#
# A cada push ou pull request na branch main, o GitHub Actions:
#   1) baixa o código, 2) prepara o Python, 3) instala dependências,
#   4) roda a análise estática (flake8) e 5) executa os testes (pytest).
# Se qualquer etapa falhar, o pipeline fica vermelho e o código não é
# considerado íntegro.
# =====================================================================
name: CI - DescomplicaBusiness API

# Eventos que disparam o pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-e-testes:
    # Máquina virtual fornecida pelo GitHub onde o pipeline roda
    runs-on: ubuntu-latest

    steps:
      # 1) Baixa o código do repositório para a VM do runner
      - name: Checkout do código
        uses: actions/checkout@v4

      # 2) Configura o ambiente Python na versão usada no projeto
      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3) Instala as dependências declaradas em requirements.txt
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4) Etapa ADICIONAL: análise estática (lint) com flake8.
      #    Garante padrão de código e pega erros de sintaxe/estilo antes dos testes.
      - name: Análise estática (flake8)
        run: flake8 api

      # 5) Executa os testes unitários com pytest
      - name: Executar testes (pytest)
        run: pytest -v
